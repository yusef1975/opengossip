<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gossip Protocol Grid Visualizer</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui-layer {
            position: absolute;
            top: 40px;
            left: 40px;
            color: #ffffff;
            pointer-events: none;
        }

        h1 {
            font-size: 1.2rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin: 0 0 8px 0;
            color: rgba(255, 255, 255, 0.9);
        }

        p {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
            margin: 0;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <h1>Iberian Grid</h1>
        <p>GOSSIP PROTOCOL &bull; AI CONTROL PLANE</p>
    </div>

    <canvas id="gridCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gridCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let nodes = [];
        let supervisor = null;

        const CITIES = [
            { name: "Madrid", isSeed: true },
            { name: "Lisbon", isSeed: true },
            { name: "Barcelona", isSeed: true },
            { name: "Seville", isSeed: false },
            { name: "Porto", isSeed: false },
            { name: "Valencia", isSeed: false },
            { name: "Bilbao", isSeed: false },
            { name: "Faro", isSeed: false }
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initGraph();
        }

        window.addEventListener('resize', resize);

        class Node {
            constructor(name, x, y, isSeed) {
                this.name = name;
                this.targetX = x;
                this.targetY = y;
                this.x = x + (Math.random() - 0.5) * 100;
                this.y = y + (Math.random() - 0.5) * 100;
                this.vx = 0;
                this.vy = 0;
                this.isSeed = isSeed;
                this.radius = isSeed ? 6 : 4;
                this.pulseOffset = Math.random() * Math.PI * 2;
                
                // For hovering/floating effect
                this.floatOffsetX = Math.random() * 100;
                this.floatOffsetY = Math.random() * 100;
            }

            update(time) {
                // Gentle floating
                const floatX = Math.sin(time * 0.001 + this.floatOffsetX) * 20;
                const floatY = Math.cos(time * 0.0012 + this.floatOffsetY) * 20;
                
                // Spring physics to target
                const dx = (this.targetX + floatX) - this.x;
                const dy = (this.targetY + floatY) - this.y;
                
                this.vx += dx * 0.01;
                this.vy += dy * 0.01;
                
                this.vx *= 0.85; // friction
                this.vy *= 0.85;
                
                this.x += this.vx;
                this.y += this.vy;
            }

            draw(ctx, time) {
                const pulse = Math.sin(time * 0.003 + this.pulseOffset) * 0.5 + 0.5;
                
                // Glow
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * (1 + pulse * 1.5), 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${0.1 + pulse * 0.1})`;
                ctx.fill();

                // Core
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = "#ffffff";
                ctx.fill();

                // Text
                ctx.font = "11px Inter, sans-serif";
                ctx.fillStyle = "rgba(255, 255, 255, 0.6)";
                ctx.textAlign = "center";
                ctx.fillText(this.name, this.x, this.y + 20);
            }
        }

        class Supervisor {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 12;
            }

            update(time) {
                this.y = 100 + Math.sin(time * 0.002) * 10;
            }

            draw(ctx, time) {
                // Diamond shape
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(time * 0.0005);
                
                // Outer rotating ring
                ctx.beginPath();
                ctx.rect(-16, -16, 32, 32);
                ctx.strokeStyle = "rgba(255, 255, 255, 0.2)";
                ctx.lineWidth = 1;
                ctx.stroke();

                // Inner core
                ctx.rotate(-time * 0.001);
                ctx.beginPath();
                ctx.rect(-8, -8, 16, 16);
                ctx.fillStyle = "#ffffff";
                ctx.fill();
                
                ctx.restore();

                // Text
                ctx.font = "500 12px Inter, sans-serif";
                ctx.fillStyle = "rgba(255, 255, 255, 0.9)";
                ctx.textAlign = "center";
                ctx.fillText("AI SUPERVISOR", this.x, this.y - 30);
                
                ctx.font = "10px Inter, sans-serif";
                ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
                ctx.fillText("CONTROL PLANE", this.x, this.y - 45);
            }
        }

        function initGraph() {
            nodes = [];
            const centerX = width / 2;
            const centerY = height / 2 + 50;
            const radius = Math.min(width, height) * 0.3;

            CITIES.forEach((city, i) => {
                const angle = (i / CITIES.length) * Math.PI * 2;
                // Add some randomness to layout so it's not a perfect circle
                const r = radius * (0.8 + Math.random() * 0.4);
                const x = centerX + Math.cos(angle) * r;
                const y = centerY + Math.sin(angle) * r * 0.7; // Squish slightly for perspective
                
                nodes.push(new Node(city.name, x, y, city.isSeed));
            });

            supervisor = new Supervisor(centerX, 100);
        }

        function drawConnections(time) {
            // Data Plane (Gossip lines between nodes)
            ctx.lineWidth = 1;
            for (let i = 0; i < nodes.length; i++) {
                for (let j = i + 1; j < nodes.length; j++) {
                    const dist = Math.hypot(nodes[i].x - nodes[j].x, nodes[i].y - nodes[j].y);
                    
                    // Only connect if they are relatively close (gossip topology)
                    if (dist < 400) {
                        // Pulsing opacity for active gossip
                        const activeGossip = Math.sin(time * 0.005 + i + j) > 0.8;
                        const opacity = activeGossip ? 0.4 : 0.05;
                        
                        ctx.beginPath();
                        ctx.moveTo(nodes[i].x, nodes[i].y);
                        ctx.lineTo(nodes[j].x, nodes[j].y);
                        ctx.strokeStyle = `rgba(255, 255, 255, ${opacity})`;
                        ctx.stroke();

                        // Draw moving packet if active
                        if (activeGossip) {
                            const progress = (time * 0.002 + i) % 1;
                            const px = nodes[i].x + (nodes[j].x - nodes[i].x) * progress;
                            const py = nodes[i].y + (nodes[j].y - nodes[i].y) * progress;
                            
                            ctx.beginPath();
                            ctx.arc(px, py, 2, 0, Math.PI * 2);
                            ctx.fillStyle = "#ffffff";
                            ctx.fill();
                        }
                    }
                }
            }

            // Control Plane (Listening lines to Supervisor)
            nodes.forEach((node, i) => {
                const isSyncing = Math.sin(time * 0.002 + i * 2) > 0.95;
                
                ctx.beginPath();
                ctx.moveTo(node.x, node.y);
                
                // Curve up to supervisor
                const cpX = (node.x + supervisor.x) / 2;
                const cpY = supervisor.y + 100;
                
                ctx.quadraticCurveTo(cpX, cpY, supervisor.x, supervisor.y);
                
                if (isSyncing) {
                    ctx.strokeStyle = "rgba(255, 255, 255, 0.3)";
                    ctx.setLineDash([4, 4]);
                    // Animate dash offset
                    ctx.lineDashOffset = -time * 0.05;
                } else {
                    ctx.strokeStyle = "rgba(255, 255, 255, 0.02)";
                    ctx.setLineDash([]);
                }
                
                ctx.stroke();
                ctx.setLineDash([]); // Reset
            });
        }

        function animate(time) {
            // Completely clear the canvas to true black every frame 
            // to prevent the muddy alpha-blending grey ghosting effect.
            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, width, height);

            supervisor.update(time);
            
            nodes.forEach(node => node.update(time));
            
            drawConnections(time);
            
            nodes.forEach(node => node.draw(ctx, time));
            supervisor.draw(ctx, time);

            requestAnimationFrame(animate);
        }

        // Boot
        resize();
        requestAnimationFrame(animate);

    </script>
</body>
</html>
